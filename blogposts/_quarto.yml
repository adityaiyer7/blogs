project:
  type: website
  output-dir: docs

metadata-files:
  - _links.yml

website:
  description: "Notes on mechanistic interpretability and machine learning."
  site-url: https://adityaiyer7.github.io/blogs
  comments:
    giscus:
      repo: adityaiyer7/blogs
      repo-id: R_kgDOPEENLQ
      category: "Blog Comments"
      category-id: DIC_kwDOPEENLc4C5l2J
      mapping: pathname
      reactions-enabled: true
      input-position: bottom
      theme: preferred_color_scheme
      language: en
  body-footer: |
    <script>
      window.goatcounter = {
        path: function(p) {
          return location.pathname.replace(/index\.html$/, '');
        }
      };
      (function() {
        var s = document.createElement('script');
        s.async = true;
        s.src = '//gc.zgo.at/count.js';
        s.setAttribute('data-goatcounter', 'https://adityaiyer7.goatcounter.com/count');
        document.body.appendChild(s);
      })();
    </script>

format:
  html:
    theme: cosmo
    css: styles.css
    mainfont: "Lora"
    highlight-style: github
    code-fold: true
    code-tools: false
    toc: true
    toc-depth: 3
    toc-title: "Contents"
    number-sections: false
    df-print: paged
    fig-align: center
    math: mathjax
    # Inline citation rendering (see citation_instruction_user.md / citation_instruction_agent.md).
    # These are inert for posts that contain no citations, so they are safe to set globally.
    csl: nature.csl           # superscript numbers + numbered reference list (CC-BY-SA)
    link-citations: true      # make the superscript a link to its reference entry (NOT a Pandoc default)
    link-bibliography: true   # make URLs in the reference list clickable (default true; explicit for clarity)
    citations-hover: true     # hover preview popup of the source (default true; explicit for clarity)
    grid:
      body-width: 850px
      margin-width: 300px