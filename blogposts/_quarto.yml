project:
  type: website
  output-dir: docs

metadata-files:
  - _links.yml

website:
  description: "Notes on mechanistic interpretability and machine learning."
  site-url: https://adityaiyer7.github.io/blogs
  comments:
    giscus:
      repo: adityaiyer7/blogs
      repo-id: R_kgDOPEENLQ
      category: "Blog Comments"
      category-id: DIC_kwDOPEENLc4C5l2J
      mapping: pathname
      reactions-enabled: true
      input-position: bottom
      theme: preferred_color_scheme
      language: en
  body-footer: |
    <script data-goatcounter="https://adityaiyer7.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>

format:
  html:
    theme: cosmo
    css: styles.css
    mainfont: "Lora"
    highlight-style: github
    code-fold: true
    code-tools: false
    toc: true
    toc-depth: 3
    toc-title: "Contents"
    number-sections: false
    df-print: paged
    fig-align: center
    math: mathjax
    grid:
      body-width: 850px
      margin-width: 300px